<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (localStorage.getItem("userId")) {
            window.location.replace("/dashboard.html");
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | ProResume</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 🌸 CHERRY BLOSSOM MINIMALIST THEME (Auth Page) 🌸 --- */
        :root {
            --primary: #da8a8a;       /* Muted Rose Pink */
            --accent: #9b5b5b;        /* Dusty Rose / Wine for depth */
            --bg: #faf7f7;            /* Off-white Pearl */
            --card-bg: rgba(255, 255, 255, 0.85); 
            --input-bg: #ffffff; 
            --border: #f0e2e2;        /* Soft pinkish border */
            --text-main: #3d2b2b;     /* Deep Cocoa / Dark Brown */
            --text-dim: #8e7d7d;      /* Muted Mauve */
            --primary-glow: rgba(218, 138, 138, 0.2);
            --gas-color: rgba(218, 138, 138, 0.25); 
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text-main); 
            display: flex; 
            flex-direction: row; 
            min-height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
        }

        /* =========================================
           🚨 LEFT PANEL (Soft Depth & Ambient Lighting) 🚨
           ========================================= */
        .left-panel {
            flex: 1.8; 
            position: relative;
            background-color: var(--bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* Ambient Lighting & Dotted Grid confined to left side */
            background-image: 
                radial-gradient(circle at 15% 0%, rgba(255, 255, 255, 0.9) 0%, transparent 40%), 
                radial-gradient(circle at 85% 10%, rgba(218, 138, 138, 0.12) 0%, transparent 40%), 
                radial-gradient(circle at 50% 100%, rgba(155, 91, 91, 0.04) 0%, transparent 50%), 
                radial-gradient(rgba(142, 125, 125, 0.1) 1px, transparent 1px); 
            background-size: 100% 100%, 100% 100%, 100% 100%, 30px 30px; 
            background-position: 0 0, 0 0, 0 0, 15px 15px; 
        }

        /* Desktop Navbar */
        .desktop-nav {
            position: absolute; 
            top: 0; left: 0; right: 0; width: 100%; 
            display: flex; justify-content: flex-start; align-items: center; padding: 40px 50px 0 50px; z-index: 100;
        }
        .desktop-nav .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; color: var(--text-main); margin: 0; text-decoration: none; }
        .desktop-nav .logo span { color: var(--primary); }

        /* Left Side Content Wrapper */
        .welcome-side { 
            position: relative; z-index: 10; 
            display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
            animation: fadeIn 1s ease forwards;
            width: 100%; max-width: 600px;
            padding: 0 40px;
        }

        .welcome-text-container {
            width: 100%; text-align: left;
            margin-bottom: 0; position: relative; z-index: 20;
        }

        .welcome-text-container h1 { 
            font-size: 4.2rem; font-weight: 800; margin: 0 0 10px 0; color: var(--text-main); 
            letter-spacing: -2px; text-align: left; line-height: 1.05; white-space: nowrap;
            /* Softer elegant text shadows */
            text-shadow: 0 12px 30px rgba(61, 43, 43, 0.06), 0 4px 10px rgba(61, 43, 43, 0.03), 0 1px 0 rgba(255,255,255,1); 
        }
        .welcome-divider { width: 50px; height: 5px; background: linear-gradient(to right, var(--primary), var(--accent)); margin-bottom: 15px; border-radius: 4px; box-shadow: 0 4px 10px rgba(218, 138, 138, 0.3); }
        .welcome-text-container p { color: var(--text-dim); font-size: 1.05rem; line-height: 1.6; max-width: 420px; text-shadow: 0 1px 1px rgba(255,255,255,0.9); font-weight: 500; margin-bottom: 0;}

        /* Animation */
        .isometric-container {
            position: relative; width: 100%; max-width: 450px; height: 260px; 
            perspective: 1200px; transform-style: preserve-3d;
            display: block; 
            margin-top: -50px; 
            margin-left: 80px; 
        }

        /* Gas & Shapes specific to Left Panel */
        .gas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .gas-text { position: absolute; bottom: -50px; color: var(--gas-color); font-weight: 800; letter-spacing: 2px; opacity: 0; animation: floatGas var(--duration) ease-in forwards; }
        
        .float-card {
            position: absolute; background: linear-gradient(145deg, #ffffff, #faf7f7);
            border: 1px solid rgba(255,255,255,0.9); border-radius: 16px;
            /* Premium soft mauve shadows */
            box-shadow: 0 20px 40px rgba(61, 43, 43, 0.05), 0 8px 20px rgba(61, 43, 43, 0.03), inset 0 2px 2px rgba(255,255,255,1);
            z-index: 1; opacity: 0.9; pointer-events: none;
        }
        .fc-1 { width: 140px; height: 140px; top: 12%; left: 15%; animation: float1 8s infinite alternate ease-in-out; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .fc-2 { width: 200px; height: 80px; bottom: 15%; right: 10%; animation: float2 10s infinite alternate ease-in-out; display: flex; flex-direction: column; justify-content: center; padding: 0 20px;}
        .fc-3 { width: 90px; height: 90px; top: 25%; right: 18%; animation: float3 9s infinite alternate ease-in-out; border-radius: 20px; transform: rotate(15deg); display: flex; align-items: center; justify-content: center;}
        .fc-4 { width: 120px; height: 40px; bottom: 25%; left: 12%; animation: float1 7s infinite alternate-reverse ease-in-out; border-radius: 20px; display: flex; align-items: center; justify-content: center; }

        @keyframes float1 { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-30px) scale(1.05); } }
        @keyframes float2 { 0% { transform: translateY(0) rotate(-3deg); } 100% { transform: translateY(20px) rotate(2deg); } }
        @keyframes float3 { 0% { transform: translateY(0) rotate(15deg); } 100% { transform: translateY(-25px) rotate(5deg); } }
        @keyframes floatGas {
            0% { opacity: 0; transform: translate(0, 0) scale(0.8) rotate(0deg); filter: blur(0px); }
            10% { opacity: 0.8; }
            60% { opacity: 0.6; transform: translate(var(--sway-mid), -50vh) scale(1.1) rotate(var(--rot-mid)); filter: blur(0px); }
            85% { opacity: 0.3; filter: blur(1px); }
            100% { opacity: 0; transform: translate(var(--sway-end), -110vh) scale(1.3) rotate(var(--rot-end)); filter: blur(3px); }
        }

        /* 3D Elements */
        .iso-glow { position: absolute; top: 180px; left: 160px; width: 300px; height: 300px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(218, 138, 138, 0.25) 0%, transparent 60%); border-radius: 50%; filter: blur(30px); z-index: -1; animation: pulseGlow 4s infinite alternate; }
        .iso-paper { position: absolute; left: 10px; top: 30px; width: 260px; height: 350px; background: #ffffff; border-radius: 12px; transform: rotateX(55deg) rotateZ(-35deg) scale(0.9); transform-style: preserve-3d; box-shadow: -20px 30px 50px rgba(61, 43, 43, 0.1), inset 0 2px 2px rgba(255,255,255,1); animation: floatPaper 6s infinite alternate ease-in-out; }
        .iso-paper::before { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.7); transform: translateZ(-15px); border-radius: inherit; box-shadow: -10px 20px 30px rgba(61, 43, 43, 0.05); }
        .iso-el { position: absolute; border-radius: 4px; transform-style: preserve-3d; box-shadow: -6px 10px 15px rgba(61, 43, 43, 0.06); animation: hoverElement 3s infinite alternate ease-in-out; }
        
        .el-header { top: 30px; left: 25px; width: 120px; height: 14px; background: var(--primary); animation-delay: 0.1s; border: 1px solid rgba(218, 138, 138, 0.3);}
        .el-sub { top: 48px; left: 25px; width: 75px; height: 7px; background: var(--accent); animation-delay: 0.3s; }
        .el-avatar { top: 25px; right: 25px; width: 45px; height: 45px; border-radius: 50%; background: var(--text-main); border: 2px solid #fff; animation-delay: 0.5s; }
        .el-line-1 { top: 95px; left: 25px; width: 190px; height: 5px; background: var(--border); animation-delay: 0.7s;}
        .el-line-2 { top: 110px; left: 25px; width: 160px; height: 5px; background: var(--border); animation-delay: 0.9s;}
        .el-line-3 { top: 125px; left: 25px; width: 180px; height: 5px; background: var(--border); animation-delay: 1.1s;}
        .el-section { top: 160px; left: 25px; width: 70px; height: 8px; background: var(--primary); animation-delay: 1.3s;}
        .el-card-1 { top: 185px; left: 25px; width: 90px; height: 70px; background: rgba(255,255,255,0.9); border: 1px solid rgba(218, 138, 138, 0.2); animation-delay: 1.5s;}
        .el-card-2 { top: 185px; left: 125px; width: 90px; height: 70px; background: rgba(255,255,255,0.9); border: 1px solid rgba(155, 91, 91, 0.15); animation-delay: 1.7s;}
        .el-badge-1 { top: 275px; left: 25px; width: 40px; height: 12px; border-radius: 10px; background: var(--accent); animation-delay: 1.9s;}
        .el-badge-2 { top: 275px; left: 70px; width: 45px; height: 12px; border-radius: 10px; background: var(--primary); animation-delay: 2.1s;}
        .el-badge-3 { top: 275px; left: 120px; width: 35px; height: 12px; border-radius: 10px; background: var(--accent); animation-delay: 2.3s;}

        @keyframes pulseGlow { 0% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } }
        @keyframes floatPaper { 0% { transform: rotateX(55deg) rotateZ(-35deg) scale(0.9) translateZ(0px); } 100% { transform: rotateX(55deg) rotateZ(-35deg) scale(0.9) translateZ(20px); } }
        @keyframes hoverElement { 0% { transform: translateZ(10px); box-shadow: -5px 8px 15px rgba(61, 43, 43, 0.04); } 100% { transform: translateZ(40px); box-shadow: -15px 20px 30px rgba(61, 43, 43, 0.1); } }

        /* =========================================
           🚨 RIGHT PANEL (Auth Form) 🚨
           ========================================= */
        .right-panel { 
            flex: 1; 
            background-color: #ffffff; /* Bright clean right side */
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 10;
            padding: 0 5%;
        }

        .auth-wrapper { 
            width: 100%; 
            max-width: 320px; 
            min-height: 420px; 
            display: flex; flex-direction: column; justify-content: center;
            animation: fadeIn 0.8s ease forwards;
        }

        .form-header { text-align: center; margin-bottom: 20px; }
        .form-header h2 { margin: 0 0 6px 0; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; color: var(--text-main); }
        .form-header p { margin: 0; font-size: 0.8rem; color: var(--text-dim); }

        .form-group { margin-bottom: 10px; text-align: left; }
        label { display: block; text-align: left; font-size: 0.65rem; font-weight: 700; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input { 
            width: 100%; padding: 10px 12px; background: var(--input-bg); 
            border: 1px solid var(--border); border-radius: 8px; 
            color: var(--text-main); font-size: 0.85rem; font-weight: 500; outline: none; transition: 0.3s; text-align: left;
            box-shadow: inset 0 3px 6px rgba(61, 43, 43, 0.02), 0 1px 0 rgba(255,255,255,1);
        }
        input::placeholder { color: #d4c8c8; font-weight: 400; }
        input:focus { border-color: var(--primary); background: #ffffff; box-shadow: inset 0 1px 3px rgba(61, 43, 43, 0.02), 0 0 0 3px var(--primary-glow); transform: translateY(-1px); }

        .btn { 
            width: 100%; padding: 10px; background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: #fff; border: none; border-radius: 8px; 
            font-weight: 800; transition: 0.3s; font-size: 0.9rem; margin-top: 6px; cursor: pointer;
            box-shadow: 0 6px 12px rgba(155, 91, 91, 0.15), inset 0 1px 1px rgba(255,255,255,0.3); text-shadow: 0 1px 2px rgba(61, 43, 43, 0.2);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(155, 91, 91, 0.25), inset 0 1px 1px rgba(255,255,255,0.4); }
        .btn:active { transform: scale(0.98); }

        .social-divider { display: flex; align-items: center; text-align: center; margin: 16px 0; color: var(--text-dim); font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;}
        .social-divider::before, .social-divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .social-divider span { padding: 0 12px; }

        .social-group { display: flex; flex-direction: row; gap: 10px; }

        .btn-social {
            flex: 1; padding: 8px; background: #ffffff; border: 1px solid var(--border);
            border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;
            color: var(--text-main); font-weight: 700; font-size: 0.75rem; transition: 0.3s; cursor: pointer;
            box-shadow: 0 2px 4px rgba(61, 43, 43, 0.02);
        }
        .btn-social img, .btn-social svg { width: 16px; height: 16px; }
        .btn-social:hover { border-color: rgba(218, 138, 138, 0.4); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(61, 43, 43, 0.05); }
        .btn-social:active { transform: scale(0.98); }

        .toggle-text { text-align: center; margin-top: 16px; font-size: 0.75rem; font-weight: 600; color: var(--text-dim); }
        .toggle-text span { color: var(--accent); font-weight: 800; transition: 0.2s; border-bottom: 1px solid transparent; cursor: pointer; }
        .toggle-text span:hover { color: var(--primary); border-color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }

        /* Mobile specific styling */
        .mobile-nav { display: none; }
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .mobile-nav { display: flex; position: absolute; top: 0; left: 0; right: 0; padding: 30px 5%; justify-content: center; z-index: 100; }
            .mobile-nav .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; color: var(--text-main); margin: 0; text-decoration: none; }
            .mobile-nav .logo span { color: var(--primary); }
            
            .left-panel { display: none; } 
            .right-panel { padding-top: 80px; width: 100%; height: 100vh;}
        }

        /* 🚨 APP THEMED RESUME LOADER CSS 🚨 */
        .global-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 9000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .global-loader.active { opacity: 1; visibility: visible; }
        
        .resume-loader {
            width: 44px; height: 60px;
            background: #ffffff;
            border: 3px solid var(--accent);
            border-radius: 6px;
            padding: 10px 6px;
            display: flex; flex-direction: column; gap: 6px;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(155, 91, 91, 0.15);
            animation: floatDoc 1.5s infinite ease-in-out alternate;
        }
        .r-line { height: 4px; background: var(--primary); border-radius: 4px; transform-origin: left; animation: fillLine 1.5s infinite; }
        .r-line.r-header { height: 6px; background: var(--accent); width: 60%; animation-delay: 0s; }
        .r-line:nth-child(2) { width: 100%; animation-delay: 0.2s; }
        .r-line:nth-child(3) { width: 90%; animation-delay: 0.4s; background: var(--text-dim); opacity: 0.5; }
        .r-line.r-short { width: 50%; animation-delay: 0.6s; background: var(--text-dim); opacity: 0.5; }

        @keyframes fillLine { 0% { transform: scaleX(0); opacity: 0.3; } 50% { transform: scaleX(1); opacity: 1; } 100% { transform: scaleX(0); opacity: 0.3; } }
        @keyframes floatDoc { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-8px) scale(1.05); box-shadow: 0 15px 35px rgba(155, 91, 91, 0.25); } }

        .loader-text { font-weight: 700; color: var(--text-main); letter-spacing: 1px; font-size: 1.1rem; }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div class="global-loader" id="global-loader">
        <div class="resume-loader">
            <div class="r-line r-header"></div>
            <div class="r-line"></div>
            <div class="r-line"></div>
            <div class="r-line r-short"></div>
        </div>
        <div class="loader-text" id="loader-text">Authenticating...</div>
    </div>

    <div class="left-panel">
        <div class="gas-container" id="gas-container"></div>
        
        <div class="float-card fc-1">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="rgba(218, 138, 138, 0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        </div>
        <div class="float-card fc-2">
            <div style="width: 80%; height: 6px; background: rgba(61,43,43,0.06); border-radius: 4px; margin-bottom: 10px;"></div>
            <div style="width: 50%; height: 6px; background: rgba(61,43,43,0.04); border-radius: 4px;"></div>
        </div>
        <div class="float-card fc-3">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="rgba(155, 91, 91, 0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
        </div>
        <div class="float-card fc-4">
            <div style="width: 50%; height: 6px; background: rgba(218, 138, 138, 0.5); border-radius: 4px;"></div>
        </div>

        <nav class="desktop-nav">
            <a href="/" class="logo">Pro<span>Resume</span></a>
        </nav>

        <div class="welcome-side">
            <div class="welcome-text-container">
                <h1>Craft Your Legacy</h1>
                <div class="welcome-divider"></div>
                <p>Join ProResume to start building your career journey. Experience the most advanced ATS-optimized builder.</p>
            </div>
            
            <div class="isometric-container">
                <div class="iso-glow"></div>
                <div class="iso-paper">
                    <div class="iso-el el-header"></div>
                    <div class="iso-el el-sub"></div>
                    <div class="iso-el el-avatar"></div>
                    
                    <div class="iso-el el-line-1"></div>
                    <div class="iso-el el-line-2"></div>
                    <div class="iso-el el-line-3"></div>
                    
                    <div class="iso-el el-section"></div>
                    <div class="iso-el el-card-1"></div>
                    <div class="iso-el el-card-2"></div>
                    
                    <div class="iso-el el-badge-1"></div>
                    <div class="iso-el el-badge-2"></div>
                    <div class="iso-el el-badge-3"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="mobile-nav">
        <a href="/" class="logo">Pro<span>Resume</span></a>
    </div>

    <div class="right-panel">
        
        <div class="auth-wrapper">
            <div class="form-header">
                <h2 id="form-title">Create Account</h2>
                <p id="form-subtitle">Start building your professional legacy.</p>
            </div>
            
            <form id="auth-form">
                <div class="form-group" id="name-group">
                    <label>Full Name</label>
                    <input type="text" id="name-input" placeholder="e.g. Shaurya Singh">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-group" id="confirm-password-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password-input" placeholder="••••••••">
                </div>

                <button type="submit" class="btn" id="submit-btn">Continue</button>
                
                <div class="social-divider"><span>Or continue with</span></div>

                <div class="social-group">
                    <button type="button" class="btn-social" onclick="loginWith('google')">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48px" height="48px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                        <span>Google</span>
                    </button>
                    <button type="button" class="btn-social" onclick="loginWith('github')">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50px" height="50px">    <path d="M17.791,46.836C18.502,46.53,19,45.823,19,45v-5.4c0-0.197,0.016-0.402,0.041-0.61C19.027,38.994,19.014,38.997,19,39 c0,0-3,0-3.6,0c-1.5,0-2.8-0.6-3.4-1.8c-0.7-1.3-1-3.5-2.8-4.7C8.9,32.3,9.1,32,9.7,32c0.6,0.1,1.9,0.9,2.7,2c0.9,1.1,1.8,2,3.4,2 c2.487,0,3.82-0.125,4.622-0.555C21.356,34.056,22.649,33,24,33v-0.025c-5.668-0.182-9.289-2.066-10.975-4.975 c-3.665,0.042-6.856,0.405-8.677,0.707c-0.058-0.327-0.108-0.656-0.151-0.987c1.797-0.296,4.843-0.647,8.345-0.714 c-0.112-0.276-0.209-0.559-0.291-0.849c-3.511-0.178-6.541-0.039-8.187,0.097c-0.02-0.332-0.047-0.663-0.051-0.999 c1.649-0.135,4.597-0.27,8.018-0.111c-0.079-0.5-0.13-1.011-0.13-1.543c0-1.7,0.6-3.5,1.7-5c-0.5-1.7-1.2-5.3,0.2-6.6 c2.7,0,4.6,1.3,5.5,2.1C21,13.4,22.9,13,25,13s4,0.4,5.6,1.1c0.9-0.8,2.8-2.1,5.5-2.1c1.5,1.4,0.7,5,0.2,6.6c1.1,1.5,1.7,3.2,1.6,5 c0,0.484-0.045,0.951-0.11,1.409c3.499-0.172,6.527-0.034,8.204,0.102c-0.002,0.337-0.033,0.666-0.051,0.999 c-1.671-0.138-4.775-0.28-8.359-0.089c-0.089,0.336-0.197,0.663-0.325,0.98c3.546,0.046,6.665,0.389,8.548,0.689 c-0.043,0.332-0.093,0.661-0.151,0.987c-1.912-0.306-5.171-0.664-8.879-0.682C35.112,30.873,31.557,32.75,26,32.969V33 c2.6,0,5,3.9,5,6.6V45c0,0.823,0.498,1.53,1.209,1.836C41.37,43.804,48,35.164,48,25C48,12.318,37.683,2,25,2S2,12.318,2,25 C2,35.164,8.63,43.804,17.791,46.836z"/></svg>
                        <span>GitHub</span>
                    </button>
                </div>
            </form>

            <div class="toggle-text">
                <span id="toggle-mode">Already have an account? Log in</span>
            </div>
        </div>
    </div>

    <script>
        // --- Gas Particle Logic ---
        const gasWords = ['details', 'job', 'education', 'experience', 'skills', 'engineer', 'designer', 'developer', 'analyst', 'creator', 'manager', 'architect', 'writer', 'visionary', 'founder', 'leader', 'strategist', 'innovator', 'expert', 'consultant', 'achievements', 'projects', 'freelancer', 'portfolio', 'ATS', 'optimized', 'hired', 'interview', 'career', 'recruiter', 'offer'];
        const gasContainer = document.getElementById('gas-container');
        const NUM_LANES = 25;
        const laneWidth = 100 / NUM_LANES; 
        const laneCooldowns = new Array(NUM_LANES).fill(0);

        function spawnGasParticle(isInitialLoad = false) {
            if (!gasContainer) return;
            const particle = document.createElement('div');
            particle.classList.add('gas-text');
            particle.innerText = gasWords[Math.floor(Math.random() * gasWords.length)];
            const now = Date.now();
            let availableLanes = [];
            for (let i = 0; i < NUM_LANES; i++) {
                if (now - laneCooldowns[i] > 1500) { availableLanes.push(i); }
            }
            if (availableLanes.length === 0) { availableLanes = [Math.floor(Math.random() * NUM_LANES)]; }
            const selectedLane = availableLanes[Math.floor(Math.random() * availableLanes.length)];
            laneCooldowns[selectedLane] = now; 
            
            const startX = (selectedLane * laneWidth) + (Math.random() * (laneWidth * 0.4)); 
            const duration = 8 + Math.random() * 7; 
            const swayMid = (Math.random() - 0.5) * 40; 
            const swayEnd = (Math.random() - 0.5) * 60; 
            const rotMid = (Math.random() - 0.5) * 20; 
            const rotEnd = (Math.random() - 0.5) * 40; 
            const fontSize = 0.5 + Math.random() * 0.6; 
            let delay = isInitialLoad ? -(Math.random() * duration) : 0;

            particle.style.left = `${startX}%`; 
            particle.style.fontSize = `${fontSize}rem`;
            particle.style.setProperty('--duration', `${duration}s`);
            particle.style.setProperty('--sway-mid', `${swayMid}px`);
            particle.style.setProperty('--sway-end', `${swayEnd}px`);
            particle.style.setProperty('--rot-mid', `${rotMid}deg`);
            particle.style.setProperty('--rot-end', `${rotEnd}deg`);
            particle.style.animationDelay = `${delay}s`;

            gasContainer.appendChild(particle);
            setTimeout(() => { particle.remove(); }, (duration + Math.max(0, delay)) * 1000);
        }

        for(let i = 0; i < 25; i++) { spawnGasParticle(true); }
        setInterval(() => spawnGasParticle(false), 350);

        // Toggle Logic
        let isLogin = false;
        const nameGroup = document.getElementById('name-group');
        const confirmPasswordGroup = document.getElementById('confirm-password-group');
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleMode = document.getElementById('toggle-mode');

        toggleMode.addEventListener('click', () => {
            isLogin = !isLogin;
            nameGroup.style.display = isLogin ? 'none' : 'block';
            confirmPasswordGroup.style.display = isLogin ? 'none' : 'block';
            formTitle.innerText = isLogin ? 'Welcome Back' : 'Create Account';
            formSubtitle.innerText = isLogin ? 'Log in to continue building your legacy.' : 'Start building your professional legacy.';
            submitBtn.innerText = isLogin ? 'Sign In' : 'Continue';
            toggleMode.innerText = isLogin ? "Don't have an account? Sign up" : "Already have an account? Log in";
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name-input').value;
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            const confirmPassword = document.getElementById('confirm-password-input').value;
            
            if (!isLogin && password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
            const payload = isLogin ? { email, password } : { name, email, password };
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            // 🚨 SHOW FULL SCREEN LOADER 🚨
            document.getElementById('loader-text').innerText = isLogin ? "Authenticating..." : "Creating Account...";
            document.getElementById('global-loader').classList.add('active');

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('userId', result.userId);
                    localStorage.setItem('userName', result.name); 
                    localStorage.setItem('userEmail', email); 
                    
                    window.location.href = '/dashboard.html';
                } else {
                    document.getElementById('global-loader').classList.remove('active');
                    alert('❌ ' + result.error);
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                document.getElementById('global-loader').classList.remove('active');
                alert('Could not connect to the server.');
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });

        function loginWith(provider) {
            if (provider === 'google') {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: '380873723496-q5avp286nv5ka2g9gs0tpnnuskio65bh.apps.googleusercontent.com',
                    scope: 'https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
                    callback: async (response) => {
                        if (response && response.access_token) {
                            document.getElementById('loader-text').innerText = "Syncing Google Profile...";
                            document.getElementById('global-loader').classList.add('active');

                            try {
                                const profileRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                                    headers: { Authorization: `Bearer ${response.access_token}` }
                                });
                                const profile = await profileRes.json();

                                localStorage.setItem('token', response.access_token);
                                localStorage.setItem('userName', profile.name); 
                                localStorage.setItem('userEmail', profile.email);
                                if (profile.picture) localStorage.setItem('userPhoto', profile.picture);

                                let mongoId = BigInt(profile.sub).toString(16).padStart(24, '0');
                                localStorage.setItem('userId', mongoId);
                                
                                window.location.href = 'dashboard.html';
                            } catch (err) {
                                document.getElementById('global-loader').classList.remove('active');
                                console.error("Profile fetch error:", err);
                                alert("Failed to get Google profile details.");
                            }
                        }
                    },
                    error_callback: (err) => {
                        console.error("Google Login Error:", err);
                    }
                });
                client.requestAccessToken();
                
            } else if (provider === 'github') {
                window.location.href = `/api/auth/github`;
            }
        }
    </script>
